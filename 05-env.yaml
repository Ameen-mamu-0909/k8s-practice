apiVersion: apps/v1
kind: Deployment

metadata: 
  name: coffee-shop
spec: 
  replicas: 2

  selector:
    matchLabels: 
     app: coffee-shop
      
  template: 
    metadata:
      labels:
       app: coffee-shop

    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
           -containerPort: 80 
          env:
            course: "DevSecOps with aws"
            trainer: "sivakumar reddy"
            Duration: "120Hrs"


