apiVersion: apps/v1
kind: Deployment

metadata: 
  name: config-map
  namespace: mamu
spec:  
  replicas: 3
  selector:
    matchLabels:
      app: config-map 
  template:
    metadata:
      labels:
        app: config-map 
    spec:
      containers: 
        - name: nginx
          image: nginx:1.27 
          ports:
            - containerPort: 80 
          resources: 
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits: 
              cpu: "200m"
              memory: "256Mi" 
          envFrom:
            - configMapRef:
               name: cafe-config
              

